name: Build Linux-hosted toolchains (Ubuntu 18.04)

# Manual trigger only for now -- each arch compiles a from-source GCC toolchain
# and takes a while. To build on pushes, add e.g.:
#   push:
#     branches: [ main ]
on:
  workflow_dispatch:

jobs:
  build:
    name: Build ${{ matrix.arch }}
    runs-on: ubuntu-latest
    # One arch per job, in parallel; don't let one arch's failure cancel the rest.
    strategy:
      fail-fast: false
      matrix:
        arch: [i586, i686, x86_64]
    # A single from-source toolchain is long but well under the 6h job ceiling.
    timeout-minutes: 120
    steps:
      # checkout/upload run on the HOST (modern glibc) because their node20
      # runtime needs glibc >= 2.28 and would crash inside the 18.04 container.
      - name: Checkout
        uses: actions/checkout@v4

      # Build inside Ubuntu 18.04 (glibc 2.27) so the resulting Linux-hosted
      # toolchain runs on every ESM-supported Ubuntu/Debian (18.04+, Debian 10+).
      # The GitHub-hosted ubuntu-18.04 image is retired and the `container:` key
      # can't be used here (node20 actions won't run on glibc 2.27), so we drive
      # the container directly and bind-mount the workspace so the .zip lands
      # back on the host for upload.
      - name: Build ${{ matrix.arch }} and package (Ubuntu 18.04 container)
        run: |
          docker run --rm \
            -v "$PWD":/work -w /work \
            -e DEBIAN_FRONTEND=noninteractive \
            ubuntu:18.04 bash -e -o pipefail -c '
              # bare image lacks the tools the build needs before --deps runs
              apt-get update
              apt-get install -y --no-install-recommends git curl ca-certificates
              ./mingw-linux-build.sh --deps
              ./mingw-linux-build.sh ${{ matrix.arch }} --package
            '

      # docker wrote build/ as root; hand it back to the runner user so the
      # upload steps (and any cleanup) can read it without permission issues.
      - name: Normalize artifact ownership
        if: always()
        run: sudo chown -R "$(id -u):$(id -g)" build || true

      - name: Upload toolchain zip
        uses: actions/upload-artifact@v4
        with:
          # one zip per job: i586.zip, i686.zip, or x64.zip (x86_64)
          name: mingw-linux-${{ matrix.arch }}
          path: build/*.zip
          if-no-files-found: error

      - name: Upload build log
        # always grab the log, especially useful when the build fails
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log-${{ matrix.arch }}
          path: build/build.log
          if-no-files-found: ignore
